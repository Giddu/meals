<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meals Planner</title>
    <meta name="theme-color" content="#2d6a4f">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icons/icon-192.png">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <h1>Meals Planner</h1>
        <p class="subtitle">Pick a meal for today</p>
    </header>

    <main>
        <section id="meal-plan" class="meal-plan">
            <div class="meal-slot" data-meal="meal">
                <h2>Meal</h2>
                <div class="selected-meal">
                    <span class="placeholder">Tap to pick</span>
                </div>
            </div>
        </section>

        <button id="randomize-btn" class="btn btn-primary">Randomize</button>

        <div id="meal-picker" class="meal-picker hidden">
            <div class="picker-backdrop"></div>
            <div class="picker-content">
                <div class="picker-header">
                    <h2 id="picker-title">Pick a meal</h2>
                    <button class="picker-close">&times;</button>
                </div>
                <div id="picker-list" class="picker-list"></div>
            </div>
        </div>
    </main>

    <script src="js/meals.js"></script>
    <script src="js/app.js"></script>
    <script>
        if ("serviceWorker" in navigator) {
            navigator.serviceWorker.register("sw.js");
        }
    </script>
</body>
</html>
