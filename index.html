<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meals Planner</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <h1>Meals Planner</h1>
        <p class="subtitle">Plan your meals for the day</p>
    </header>

    <main>
        <section id="meal-plan" class="meal-plan">
            <div class="meal-slot" data-meal="breakfast">
                <h2>Breakfast</h2>
                <div class="selected-meal">
                    <span class="placeholder">Tap to pick</span>
                </div>
            </div>
            <div class="meal-slot" data-meal="lunch">
                <h2>Lunch</h2>
                <div class="selected-meal">
                    <span class="placeholder">Tap to pick</span>
                </div>
            </div>
            <div class="meal-slot" data-meal="dinner">
                <h2>Dinner</h2>
                <div class="selected-meal">
                    <span class="placeholder">Tap to pick</span>
                </div>
            </div>
        </section>

        <button id="randomize-btn" class="btn btn-primary">Randomize All</button>

        <div id="meal-picker" class="meal-picker hidden">
            <div class="picker-backdrop"></div>
            <div class="picker-content">
                <div class="picker-header">
                    <h2 id="picker-title">Pick a meal</h2>
                    <button class="picker-close">&times;</button>
                </div>
                <div id="picker-list" class="picker-list"></div>
            </div>
        </div>
    </main>

    <script src="js/meals.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
